{{- /*
Standalone Ingress for web-portal. Disabled by default because the unified
api-gateway Ingress already routes app.<domain> → web-portal. Enable here only
if you want web-portal exposed separately (e.g., different ingress class).
*/ -}}
{{- if and .Values.ingress.enabled .Values.ingress.standalone .Values.global.ingress.enabled -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "svc.fullname" . }}
  namespace: {{ include "svc.namespace" . }}
  labels:
    {{- include "svc.labels" . | nindent 4 }}
  annotations:
    {{- if and .Values.global.ingress.tls.enabled .Values.global.ingress.tls.clusterIssuer }}
    cert-manager.io/cluster-issuer: {{ .Values.global.ingress.tls.clusterIssuer | quote }}
    {{- end }}
    {{- with .Values.global.ingress.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  ingressClassName: {{ .Values.global.ingress.className }}
  {{- if .Values.global.ingress.tls.enabled }}
  tls:
    - hosts:
        - {{ printf "app.%s" .Values.global.domain | quote }}
      secretName: {{ printf "%s-tls" (include "svc.fullname" .) | quote }}
  {{- end }}
  rules:
    - host: {{ printf "app.%s" .Values.global.domain | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "svc.fullname" . }}
                port:
                  number: {{ .Values.service.port }}
{{- end -}}
