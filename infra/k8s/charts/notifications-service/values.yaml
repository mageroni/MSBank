# Default values for notifications-service. Most globals come from the umbrella chart;
# only sub-chart-specific knobs live here.

# Globals are normally injected by the umbrella chart. The defaults below
# allow this sub-chart to be installed standalone for dev/testing.
global:
  namespace: msbank
  image:
    registry: acr.azurecr.io
    repositoryPrefix: msbank
    tag: "0.1.0"
    pullPolicy: IfNotPresent
    pullSecrets:
      - name: acr-pull-secret
  otel:
    endpoint: http://otel-collector.observability.svc.cluster.local:4317
    serviceNamespace: msbank
  workloadIdentity:
    enabled: true
    tenantId: "00000000-0000-0000-0000-000000000000"
  kafka:
    bootstrapServers: ""
    securityProtocol: SASL_SSL
    saslMechanism: PLAIN
    saslUsername: "$ConnectionString"
  postgres:
    host: ""
    port: 5432
    user: msbank
    sslMode: require
  redis:
    host: ""
    port: 6380
    tls: true
  auth:
    issuer: "https://auth.msbank.example.com"
    audience: "msbank"
    accessTtlSeconds: 900
    refreshTtlSeconds: 2592000
  nodeSelector: {}
  pod:
    topologySpread:
      enabled: false

replicaCount: 2

# Workload identity client ID (UUID of the Azure managed identity for this svc)
workloadIdentityClientId: "00000000-0000-0000-0000-000000000005"

image:
  # registry: <override of global>
  # repository: msbank/notifications-service
  # tag: 0.1.0
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8084
  targetPort: 8084

serviceAccount:
  create: true
  name: ""
  annotations: {}

logLevel: info

probes:
  startup:
    path: /healthz
  readiness:
    path: /readyz
  liveness:
    path: /healthz

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

readOnlyRootFilesystem: true

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 8
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

pdb:
  enabled: true
  minAvailable: 1

networkPolicy:
  enabled: true
  allowIngressFromIngressController: false
  extraEgress: []

podAnnotations: {}
extraEnv: {}
env: []
extraVolumes: []
extraVolumeMounts: []

extraEnv:
  NOTIFICATIONS_DB_NAME: "notifications"
  SMTP_HOST: "smtp.azurecomm.net"
  SMTP_PORT: "587"
  SMTP_FROM: "no-reply@msbank.example.com"

