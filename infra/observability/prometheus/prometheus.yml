global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: msbank-local
    env: local

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  # OTel Collector self-metrics + prometheus exporter pipeline output
  - job_name: otel-collector
    static_configs:
      - targets: ["otel-collector:8889"]

  # Spring Boot services expose Micrometer at /actuator/prometheus
  - job_name: auth-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["auth-service:8081"]
        labels: { service: auth-service }

  - job_name: accounts-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["accounts-service:8082"]
        labels: { service: accounts-service }

  # Go / Python / Node services expose /metrics
  - job_name: transactions-service
    metrics_path: /metrics
    static_configs:
      - targets: ["transactions-service:8083"]
        labels: { service: transactions-service }

  - job_name: notifications-service
    metrics_path: /metrics
    static_configs:
      - targets: ["notifications-service:8084"]
        labels: { service: notifications-service }

  - job_name: api-gateway
    metrics_path: /metrics
    static_configs:
      - targets: ["api-gateway:8080"]
        labels: { service: api-gateway }
