<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>{{ subject }}</title>
    <style>
      body { font-family: -apple-system, Segoe UI, Roboto, sans-serif; color: #1a202c; }
      .wrap { max-width: 560px; margin: 0 auto; padding: 24px; }
      .brand { background: #0b3d91; color: #ffffff; padding: 20px 24px; border-radius: 8px 8px 0 0; }
      .brand h1 { margin: 0; font-size: 20px; }
      .card { background: #f7fafc; padding: 24px; border-radius: 0 0 8px 8px; }
      .footer { font-size: 12px; color: #718096; margin-top: 24px; }
      .btn { display: inline-block; padding: 10px 16px; background: #0b3d91; color: #fff;
             text-decoration: none; border-radius: 4px; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="brand">
        <h1>Microservice Bank</h1>
      </div>
      <div class="card">
        {% block content %}{% endblock %}
      </div>
      <p class="footer">
        Microservice Bank • Demo environment • Do not reply to this address.
      </p>
    </div>
  </body>
</html>
