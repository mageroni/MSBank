{% extends "email/_base.html" %}
{% block content %}
  <h2>Transfer completed</h2>
  <p>
    Your transfer of <strong>{{ amount }}</strong> from account
    <code>{{ source_account }}</code> to <code>{{ destination_account }}</code>
    completed successfully.
  </p>
  <p>Reference: <code>{{ transfer_id }}</code></p>
  <p>
    <a class="btn" href="https://app.msbank.local/transfers/{{ transfer_id }}">See transfer</a>
  </p>
{% endblock %}
