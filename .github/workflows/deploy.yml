name: Deploy to AKS

# Manual deploy. Assumes images are already published to ACR by a separate
# workflow (or mirrored from GHCR). Uses OIDC federated credentials for Azure.

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        type: choice
        options: [dev, staging, prod]
        default: dev
      image_tag:
        description: Image tag to deploy (e.g., sha-abc1234 or v1.2.3)
        required: true

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    name: Deploy ${{ inputs.environment }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    env:
      AZURE_RESOURCE_GROUP: msbank-${{ inputs.environment }}-rg
      AKS_NAME: msbank-${{ inputs.environment }}-aks
      NAMESPACE: msbank
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Azure login (OIDC)
        uses: azure/login@a457da9ea143d694b1b9c7c869ebb04ebe844ef5 # v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Get AKS credentials
        uses: azure/aks-set-context@c7eb093e5a5d47caa333f64974d5fd1cd4bf069d # v4
        with:
          resource-group: ${{ env.AZURE_RESOURCE_GROUP }}
          cluster-name: ${{ env.AKS_NAME }}
          use-kubelogin: true

      - uses: azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4 # v4
        with: { version: 'v3.15.0' }

      - name: Helm upgrade
        run: |
          helm upgrade --install msbank infra/k8s/charts/microservice-bank \
            --namespace ${{ env.NAMESPACE }} --create-namespace \
            -f infra/k8s/charts/microservice-bank/values-aks.yaml \
            --set global.image.tag=${{ inputs.image_tag }} \
            --set global.environment=${{ inputs.environment }} \
            --wait --timeout 10m

      - name: Smoke check
        run: |
          kubectl -n ${{ env.NAMESPACE }} rollout status deploy -l app.kubernetes.io/part-of=msbank --timeout=5m
          kubectl -n ${{ env.NAMESPACE }} get pods
